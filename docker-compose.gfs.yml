services:
  gfs-weather-fetch:
    image: python:3.11
    container_name: gfs-weather-fetch
    working_dir: /workspace/wx

    volumes:
      # Code repository
      - /home/ynb/priceForecast/zym/wx:/workspace/wx

      # Persist downloaded GRIB2 data and logs outside the container
      - /home/ynb/priceForecast/zym/wx/data:/workspace/wx/data
      - /home/ynb/priceForecast/zym/wx/logs:/workspace/wx/logs

      # Required for bbox cropping of AWS S3 historical data
      - /usr/local/bin/wgrib2:/usr/local/bin/wgrib2:ro

    command:
      - bash
      - -lc
      - |
        pip install --no-cache-dir requests &&
        exec python -m gfs_guardian

    restart: unless-stopped

    cpus: "4.0"
    mem_limit: 16g
    shm_size: 1g

    environment:
      PYTHONUNBUFFERED: "1"
      PIP_INDEX_URL: https://pypi.tuna.tsinghua.edu.cn/simple
      WGRIB2: /usr/local/bin/wgrib2
